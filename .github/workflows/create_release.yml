name: Release CI - REMOVE

on:
  push:
    branches:
      - cg-test # This workflow runs when changes are pushed to the main branch

jobs:
  release:
    name: Automated Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create releases and tags
      issues: write # Needed to comment on issues/PRs linked to the release
      pull-requests: write # Needed to comment on issues/PRs linked to the release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # This is crucial for semantic-release to analyze the full history
          fetch-depth: 0

      - name: Setup Node.js (if your project or semantic-release requires it)
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or your desired Node.js version

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4 # A popular GitHub Action for semantic-release
        id: semantic
        with: 
            branch: 'cg-test'
        env:
          # GITHUB_TOKEN is automatically provided by GitHub Actions
          # It needs sufficient permissions (see 'permissions' block above)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          

      - name: Do something when a new release published
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo ${{ steps.semantic.outputs.new_release_version }}
          echo ${{ steps.semantic.outputs.new_release_major_version }}
          echo ${{ steps.semantic.outputs.new_release_minor_version }}
          echo ${{ steps.semantic.outputs.new_release_patch_version }}    
